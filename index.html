<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenClaw 玩法猎手</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #faf9f7;
      --text: #1a1a1a;
      --accent: #c9a96e;
      --accent-light: #f0e8d8;
      --muted: #888;
      --border: #e8e4de;
      --card-bg: #ffffff;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }
    .hero {
      max-width: 860px;
      margin: 0 auto;
      padding: 5rem 2rem 3rem;
      text-align: center;
    }
    .hero-tag {
      display: inline-block;
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--accent);
      border: 1px solid var(--accent);
      padding: 0.3rem 1rem;
      border-radius: 20px;
      margin-bottom: 1.5rem;
    }
    .hero h1 {
      font-family: 'Noto Serif SC', serif;
      font-size: 2.8rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 1rem;
      letter-spacing: -0.02em;
    }
    .hero p {
      font-size: 1rem;
      color: var(--muted);
      max-width: 500px;
      margin: 0 auto 2.5rem;
      line-height: 1.8;
    }
    .hero-stats {
      display: flex;
      justify-content: center;
      gap: 3rem;
    }
    .hero-stat { text-align: center; }
    .hero-stat .n { font-size: 2rem; font-weight: 300; color: var(--text); letter-spacing: -0.03em; }
    .hero-stat .l { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); margin-top: 0.3rem; }

    .divider {
      max-width: 860px;
      margin: 0 auto;
      padding: 0 2rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      color: var(--border);
    }
    .divider span { font-size: 0.7rem; letter-spacing: 0.1em; text-transform: uppercase; color: #ccc; white-space: nowrap; }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    .filter-section {
      max-width: 860px;
      margin: 2rem auto;
      padding: 0 2rem;
    }
    .filter-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      margin-bottom: 0.8rem;
    }
    .filters {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
    }
    .filter-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 0.4rem 1rem;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.78rem;
      transition: all 0.15s;
      font-family: inherit;
    }
    .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
    .filter-btn.active { background: var(--text); border-color: var(--text); color: #fff; }

    .cards-section {
      max-width: 860px;
      margin: 0 auto;
      padding: 2rem 2rem 5rem;
    }
    .cards-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
    }
    .cards-header span { font-size: 0.75rem; color: var(--muted); }
    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.2rem;
    }
    .card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      transition: all 0.2s;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
      display: block;
    }
    .card:hover {
      border-color: var(--accent);
      box-shadow: 0 4px 24px rgba(201,169,110,0.1);
      transform: translateY(-3px);
    }
    .card-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      padding: 1rem 1rem 0.8rem;
      border-bottom: 1px solid var(--bg);
    }
    .card-platform {
      font-size: 0.65rem;
      font-weight: 500;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--accent);
    }
    .card-score {
      font-size: 0.75rem;
      color: var(--muted);
    }
    .card-score strong { color: var(--text); font-weight: 600; }
    .card-body { padding: 0.8rem 1rem; }
    .card-title {
      font-family: 'Noto Serif SC', serif;
      font-size: 0.9rem;
      font-weight: 400;
      color: var(--text);
      line-height: 1.5;
      margin-bottom: 0.6rem;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .card-desc {
      font-size: 0.75rem;
      color: #666;
      line-height: 1.7;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .card-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.6rem 1rem;
      border-top: 1px solid var(--bg);
      font-size: 0.7rem;
      color: #aaa;
    }
    .card-link-hint { color: var(--accent); opacity: 0; transition: opacity 0.2s; }
    .card:hover .card-link-hint { opacity: 1; }

    .empty {
      grid-column: 1/-1;
      text-align: center;
      padding: 4rem;
      color: var(--muted);
      font-size: 0.85rem;
    }

    footer {
      border-top: 1px solid var(--border);
      padding: 2rem;
      text-align: center;
      font-size: 0.72rem;
      color: #bbb;
    }
    footer a { color: var(--accent); text-decoration: none; }

    @media (max-width: 768px) {
      .grid { grid-template-columns: 1fr 1fr; }
      .hero h1 { font-size: 2rem; }
      .hero-stats { gap: 2rem; }
    }
    @media (max-width: 500px) {
      .grid { grid-template-columns: 1fr; }
      .hero-stats { gap: 1.5rem; flex-wrap: wrap; }
    }
  </style>
</head>
<body>
  <section class="hero">
    <div class="hero-tag">OpenClaw 案例库</div>
    <h1>玩法猎手</h1>
    <p>收录全网 OpenClaw / AI Agent 真实玩法案例，按评分排序，持续更新</p>
    <div class="hero-stats">
      <div class="hero-stat"><div class="n" id="total-count">--</div><div class="l">收录案例</div></div>
      <div class="hero-stat"><div class="n" id="avg-score">--</div><div class="l">平均评分</div></div>
      <div class="hero-stat"><div class="n" id="platform-count">--</div><div class="l">来源平台</div></div>
    </div>
  </section>

  <div class="divider"><span>按平台筛选</span></div>

  <div class="filter-section">
    <div class="filters" id="filters"></div>
  </div>

  <div class="cards-section">
    <div class="cards-header">
      <span id="showing-count">全部</span>
    </div>
    <div class="grid" id="grid"></div>
  </div>

  <footer>
    Powered by <a href="https://github.com/openclaw" target="_blank">OpenClaw</a> · 数据来源：飞书多维表格
  </footer>

  <script>
    const DATA_URL = '/api/cases.json';
    let allItems = [];

    async function loadCases() {
      try {
        const res = await fetch(DATA_URL);
        allItems = await res.json();
        renderStats();
        renderFilters();
        renderGrid(allItems);
      } catch (e) {
        document.getElementById('grid').innerHTML = '<div class="empty">数据加载失败，请刷新重试</div>';
      }
    }

    function renderStats() {
      const total = allItems.length;
      const avg = total ? (allItems.reduce((s, i) => s + (parseFloat(i.score) || 0), 0) / total).toFixed(1) : '—';
      const platforms = [...new Set(allItems.map(i => i.platform).filter(Boolean))].length;
      document.getElementById('total-count').textContent = total;
      document.getElementById('avg-score').textContent = avg;
      document.getElementById('platform-count').textContent = platforms;
    }

    function renderFilters() {
      const platforms = [...new Set(allItems.map(i => i.platform).filter(Boolean))];
      const wrap = document.getElementById('filters');
      const allBtn = document.createElement('button');
      allBtn.className = 'filter-btn active';
      allBtn.textContent = '全部';
      allBtn.onclick = () => filterBy('全部', event);
      wrap.appendChild(allBtn);
      platforms.forEach(p => {
        const btn = document.createElement('button');
        btn.className = 'filter-btn';
        btn.textContent = p;
        btn.onclick = () => filterBy(p, event);
        wrap.appendChild(btn);
      });
    }

    function filterBy(platform, evt) {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      evt.target.classList.add('active');
      const items = platform === '全部' ? allItems : allItems.filter(i => i.platform === platform);
      document.getElementById('showing-count').textContent = platform === '全部' ? '全部' : platform;
      renderGrid(items);
    }

    function renderGrid(items) {
      const grid = document.getElementById('grid');
      if (!items.length) {
        grid.innerHTML = '<div class="empty">暂无案例</div>';
        return;
      }
      items = [...items].sort((a, b) => (parseFloat(b.score) || 0) - (parseFloat(a.score) || 0));
      grid.innerHTML = items.map(item => `
        <a class="card" href="${item.url || '#'}" target="_blank" rel="noopener">
          <div class="card-top">
            <span class="card-platform">${item.platform || '其他'}</span>
            <span class="card-score"><strong>${item.score || '—'}</strong> / 10</span>
          </div>
          <div class="card-body">
            <div class="card-title">${item.title || '无标题'}</div>
            <div class="card-desc">${item.description || ''}</div>
          </div>
          <div class="card-footer">
            <span>${item.difficulty ? '迁移 ' + item.difficulty : ''}</span>
            <span class="card-link-hint">查看原文 →</span>
          </div>
        </a>
      `).join('');
    }

    loadCases();
  </script>
</body>
</html>
