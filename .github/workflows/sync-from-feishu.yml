name: Sync from Feishu Bitable

on:
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Fetch records from Feishu Bitable
        id: feishu
        env:
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_APP_TOKEN: RDaKbFv7EaWDnWsjU6fcocYvnNh
          FEISHU_TABLE_ID: tblygXXyTmKGUp6q
        run: |
          TOKEN_RESP=$(curl -s -X POST "https://open.feishu.cn/open-apis/auth/v3/tenant_access_token/internal" \
            -H "Content-Type: application/json" \
            -d "{\"app_id\":\"$FEISHU_APP_ID\",\"app_secret\":\"$FEISHU_APP_SECRET\"}")
          TOKEN=$(echo $TOKEN_RESP | python3 -c "import sys,json; print(json.load(sys.stdin).get('tenant_access_token',''))")
          echo "token_len=${#TOKEN}" >> $GITHUB_OUTPUT
          if [ -z "$TOKEN" ]; then echo "Failed to get token: $TOKEN_RESP"; exit 1; fi

          ALL_RECORDS='[]'
          PAGE_TOKEN=""
          ITER=0
          while [ $ITER -lt 20 ]; do
            ITER=$((ITER+1))
            if [ -z "$PAGE_TOKEN" ]; then
              RESP=$(curl -s -g "https://open.feishu.cn/open-apis/bitable/v1/apps/$FEISHU_APP_TOKEN/tables/$FEISHU_TABLE_ID/records?page_size=500" \
                -H "Authorization: Bearer $TOKEN")
            else
              RESP=$(curl -s -g "https://open.feishu.cn/open-apis/bitable/v1/apps/$FEISHU_APP_TOKEN/tables/$FEISHU_TABLE_ID/records?page_size=500&page_token=$PAGE_TOKEN" \
                -H "Authorization: Bearer $TOKEN")
            fi
            ITEMS=$(echo $RESP | python3 -c "import sys,json; d=json.load(sys.stdin); items=d.get('data',{}).get('items',[]); print(json.dumps(items))")
            ALL_RECORDS=$(python3 -c "import json,sys; global_records=json.load(sys.stdin[0]); new_items=json.load(sys.stdin[1]); global_records.extend(new_items); print(json.dumps(global_records))" <(echo $ALL_RECORDS) <(echo $ITEMS))
            HAS_MORE=$(echo $RESP | python3 -c "import sys,json; print(json.load(sys.stdin).get('data',{}).get('has_more',False))")
            if [ "$HAS_MORE" = "False" ] || [ "$HAS_MORE" = "false" ]; then break; fi
            PAGE_TOKEN=$(echo $RESP | python3 -c "import sys,json; print(json.load(sys.stdin).get('data',{}).get('page_token',''))")
          done
          echo "total_fetched=$(echo $ALL_RECORDS | python3 -c "import json,sys; print(len(json.load(sys.stdin)))")" >> $GITHUB_OUTPUT
          echo "all_records=$ALL_RECORDS" >> $GITHUB_OUTPUT

      - name: Generate index.html
        env:
          ALL_RECORDS: ${{ fromJson(steps.feishu.outputs.all_records) }}
        run: |
          python3 << 'PYEOF'
import json, sys, os

records_raw = os.environ.get('ALL_RECORDS', '[]')
records = json.loads(records_raw)

def score(r):
    f = r.get('fields', {})
    s = f.get('评估分')
    if s is None: return 0
    try: return float(s)
    except: return 0

filtered = [r for r in records if score(r) >= 7]
print(f"Filtered: {len(records)} -> {len(filtered)} records (score >= 7)", file=sys.stderr)

def sort_key(r):
    f = r.get('fields', {})
    s = score(r)
    h = float(f.get('热度信号') or 0)
    return (-s, -h)

filtered.sort(key=sort_key)
top50 = filtered[:50]

seen_urls = {}
for r in top50:
    f = r.get('fields', {})
    link = f.get('案例链接', {}) or {}
    url = link.get('link', '') if isinstance(link, dict) else ''
    if url in seen_urls:
        if score(r) > score(seen_urls[url]):
            seen_urls[url] = r
    else:
        seen_urls[url] = r

deduped = list(seen_urls.values())
deduped.sort(key=sort_key)
final = deduped[:50]
print(f"Deduped: {len(top50)} -> {len(final)}", file=sys.stderr)

def gen_tags(r):
    f = r.get('fields', {})
    tags = []
    diff = f.get('迁移难度')
    if diff: tags.append(diff)
    plat = f.get('来源平台')
    if plat: tags.append(plat)
    启发 = f.get('启发价值') or ''
    if '多Agent' in 启发 or 'Agent' in 启发: tags.append('多Agent')
    if '变现' in 启发 or '赚钱' in 启发 or 'MRR' in 启发: tags.append('变现')
    if 'Telegram' in 启发: tags.append('Telegram')
    if 'cron' in 启发 or '定时' in 启发: tags.append('自动化')
    if 'Mac' in 启发 or 'Mini' in 启发: tags.append('本地部署')
    if '入门' in 启发 or '教程' in 启发: tags.append('入门')
    return tags[:3]

with open('index.html', 'r', encoding='utf-8') as f:
    html = f.read()

start_marker = 'const allItems = ['
end_marker = '];\nfunction diffClass'
si = html.find(start_marker)
ei = html.find(end_marker)
if si == -1 or ei == -1:
    print("ERROR: Could not find data markers in HTML", file=sys.stderr)
    sys.exit(1)

data_js = []
for r in final:
    f = r.get('fields', {})
    link = f.get('案例链接', {}) or {}
    url = (link.get('link', '') if isinstance(link, dict) else '') or ''
    title = f.get('案例名称') or f.get('OpenClaw玩法猎手-候选池') or '无标题'
    plat = f.get('来源平台') or '其他'
    s = score(r)
    diff = f.get('迁移难度') or '中等'
    desc = f.get('核心玩法描述') or ''
    tags = gen_tags(r)
    def esc(v): return (str(v) or '').replace('\\','\\\\').replace('"','\\"').replace('\n',' ').replace('\r','')
    tags_js = json.dumps(tags, ensure_ascii=False)
    data_js.append(f'{{"id":"{esc(r["id"])}","title":"{esc(title)}","platform":"{esc(plat)}","score":{s},"difficulty":"{esc(diff)}","description":"{esc(desc)}","url":"{esc(url)}","tags":{tags_js}}}')

data_str = 'const allItems = [\n      ' + ',\n      '.join(data_js) + '\n    ];'
new_html = html[:si] + data_str + html[ei:]

with open('index.html', 'w', encoding='utf-8') as f:
    f.write(new_html)
print(f"Written: {len(final)} records", file=sys.stderr)
PYEOF

      - name: Commit and push
        run: |
          if ! git diff --quiet; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add index.html
            git commit -m "chore: sync from Feishu Bitable $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push origin main
          else
            echo "No changes, skip push"
          fi
