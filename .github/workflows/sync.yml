name: Sync from Feishu
'on': workflow_dispatch
jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        persist-credentials: false
    - name: Fetch from Feishu Bitable
      id: fetch
      env:
        FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
        FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
        FEISHU_APP_TOKEN: RDaKbFv7EaWDnWsjU6fcocYvnNh
        FEISHU_TABLE_ID: tblygXXyTmKGUp6q
      run: "echo \"APP_ID_LEN=${#FEISHU_APP_ID}\" && echo \"APP_SECRET_LEN=${#FEISHU_APP_SECRET}\" && TOKEN_RESP=$(curl -s -X POST \"https://open.feishu.cn/open-apis/auth/v3/tenant_access_token/internal\" \\\n  -H \"Content-Type: application/json\" \\\n  -d \"{\\\"app_id\\\":\\\"$FEISHU_APP_ID\\\",\\\"app_secret\\\":\\\"$FEISHU_APP_SECRET\\\"}\") && \\\necho \"RAW_TOKEN_RESP=$TOKEN_RESP\" && \\\nTOKEN=$(echo $TOKEN_RESP | python3 -c \"import sys,json; print(json.load(sys.stdin).get('tenant_access_token',''))\") && \\\nif [ -z \"$TOKEN\" ]; then echo \"TOKEN_EMPTY\"; echo \"RESP=$TOKEN_RESP\"; exit 1; fi && \\\nRECORDS_FILE=$RUNNER_TEMP/feishu_records.json && \\\nALL_RECORDS='[]' && \\\nPAGE_TOKEN=\"\" && \\\nITER=0 && \\\nwhile [ $ITER -lt 20 ]; do \\\n  ITER=$((ITER+1)) && \\\n  URL=\"https://open.feishu.cn/open-apis/bitable/v1/apps/$FEISHU_APP_TOKEN/tables/$FEISHU_TABLE_ID/records?page_size=500\" && \\\n  [ -n \"$PAGE_TOKEN\" ] && URL=\"${URL}&page_token=$PAGE_TOKEN\" && \\\n  RESP=$(curl -s -g \"$URL\" -H \"Authorization: Bearer $TOKEN\") && \\\n  ITEMS=$(echo $RESP | python3 -c \"import sys,json; d=json.load(sys.stdin); print(json.dumps(d.get('data',{}).get('items',[])))\") && \\\n  ALL_RECORDS=$(python3 -c \"import json,sys; g=json.load(sys.stdin[0]); n=json.load(sys.stdin[1]); g.extend(n); print(json.dumps(g))\" <(echo $ALL_RECORDS) <(echo $ITEMS)) && \\\n  if echo $RESP | python3 -c \"import sys,json; sys.exit(0 if json.load(sys.stdin).get('data',{}).get('has_more') else 1)\"; then break; fi && \\\n  PAGE_TOKEN=$(echo $RESP | python3 -c \"import sys,json; print(json.load(sys.stdin).get('data',{}).get('page_token',''))\") && \\\ndone && \\\necho \"$ALL_RECORDS\" > $RECORDS_FILE && \\\necho \"records_file=$RECORDS_FILE\" >> $GITHUB_OUTPUT && \\\necho \"Fetched $(echo $ALL_RECORDS | python3 -c 'import json,sys; print(len(json.load(sys.stdin)))') records\" "
      shell: bash
    - name: Generate index.html
      run: python3 -c "import json,sys; records=json.load(open('/tmp/all_records.json')); print('Records:',len(records))"
      shell: bash
    - name: Commit and push
      run: 'git config user.name ''github-actions[bot]''; git config user.email ''41898282+github-actions[bot]@users.noreply.github.com''; git add index.html; git commit -m ''chore: sync $(date -u +%Y-%m-%dT%H:%M:%SZ)''; git push origin main || echo ''No changes'''
