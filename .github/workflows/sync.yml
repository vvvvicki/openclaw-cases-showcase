name: Sync from Feishu
'on': workflow_dispatch
jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        persist-credentials: false
    - name: Fetch from Feishu Bitable
      id: fetch
      env:
        FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
        FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
        FEISHU_APP_TOKEN: RDaKbFv7EaWDnWsjU6fcocYvnNh
        FEISHU_TABLE_ID: tblygXXyTmKGUp6q
      run: "TOKEN_RESP=$(curl -s -X POST \"https://open.feishu.cn/open-apis/auth/v3/tenant_access_token/internal\" \\\n  -H \"Content-Type: application/json\" \\\n  -d \"{\\\"app_id\\\":\\\"$FEISHU_APP_ID\\\",\\\"app_secret\\\":\\\"$FEISHU_APP_SECRET\\\"}\")\nTOKEN=$(echo $TOKEN_RESP | python3 -c \"import sys,json; print(json.load(sys.stdin).get('tenant_access_token',''))\")\nif [ -z \"$TOKEN\" ]; then echo \"Failed: $TOKEN_RESP\"; exit 1; fi\nRECORDS_FILE=$RUNNER_TEMP/feishu_records.json\nALL_RECORDS='[]'\nPAGE_TOKEN=\"\"\nITER=0\nwhile [ $ITER -lt 20 ]; do\n  ITER=$((ITER+1))\n  URL=\"https://open.feishu.cn/open-apis/bitable/v1/apps/$FEISHU_APP_TOKEN/tables/$FEISHU_TABLE_ID/records?page_size=500\"\n  [ -n \"$PAGE_TOKEN\" ] && URL=\"${URL}&page_token=$PAGE_TOKEN\"\n  RESP=$(curl -s -g \"$URL\" -H \"Authorization: Bearer $TOKEN\")\n  ITEMS=$(echo $RESP | python3 -c \"import sys,json; d=json.load(sys.stdin); print(json.dumps(d.get('data',{}).get('items',[])))\")\n  ALL_RECORDS=$(python3 -c \"import json,sys; g=json.load(sys.stdin[0]); n=json.load(sys.stdin[1]); g.extend(n); print(json.dumps(g))\" <(echo $ALL_RECORDS) <(echo $ITEMS))\n  if echo $RESP | python3 -c \"import sys,json; sys.exit(0 if json.load(sys.stdin).get('data',{}).get('has_more') else 1)\"; then break; fi\n  PAGE_TOKEN=$(echo $RESP | python3 -c \"import sys,json; print(json.load(sys.stdin).get('data',{}).get('page_token',''))\")\ndone\necho \"$ALL_RECORDS\" > $RECORDS_FILE\necho \"records_file=$RECORDS_FILE\" >> $GITHUB_OUTPUT\necho \"Fetched $(echo $ALL_RECORDS | python3 -c 'import json,sys; print(len(json.load(sys.stdin)))') records\""
      shell: bash
    - name: Generate index.html
      run: 'python3 -c "import json, sys records = json.load(open(''/tmp/all_records.json'')) def score(r):     fd = r.get(''fields'', {})     s = fd.get(''评估分'')     if s is None: return 0     try: return float(s)     except: return 0 filtered = [r for r in records if score(r) >= 7] filtered.sort(key=lambda r: (-score(r), -float(r.get(''fields'',{}).get(''热度信号'') or 0))) seen = {} for r in filtered:     link = r.get(''fields'',{}).get(''案例链接'',{}) or {}     url = (link.get(''link'','''') if isinstance(link,dict) else '''') or ''''     if url and (url not in seen or score(r) > score(seen[url])):         seen[url] = r final = list(seen.values())[:50] final.sort(key=lambda r: (-score(r), -float(r.get(''fields'',{}).get(''热度信号'') or 0))) def esc(v):     return (str(v) or '''').replace(''\\'',''\\\\'').replace(''\"'',''\\\"'').replace(''\n'','' '').replace(''\r'','''') html = open(''index.html'',''r'',encoding=''utf-8'').read() si = html.find(''const allItems = ['') ei = html.find(''];\nfunction diffClass'') if si==-1 or ei==-1:     print(''ERROR: markers not found'', file=sys.stderr)     sys.exit(1) data = [] for r in final:     fld = r.get(''fields'',{})     link = fld.get(''案例链接'',{}) or {}     url = (link.get(''link'','''') if isinstance(link,dict) else '''') or ''''     title = fld.get(''案例名称'') or ''无标题''     plat = fld.get(''来源平台'') or ''其他''     s = score(r)     diff = fld.get(''迁移难度'') or ''中等''     desc = fld.get(''核心玩法描述'') or ''''     tags = []     for k in [''迁移难度'',''来源平台'']:         v = fld.get(k)         if v: tags.append(v)     h = fld.get(''启发价值'') or ''''     for kw in [''多Agent'',''变现'',''Telegram'',''自动化'',''本地部署'',''入门'']:         if kw in h: tags.append(kw)     tags = tags[:3]     data.append(''{\"id\":\"''+esc(r[''id''])+''\",\"title\":\"''+esc(title)+''\",\"platform\":\"''+esc(plat)+''\",\"score\":''+str(s)+'',\"difficulty\":\"''+esc(diff)+''\",\"description\":\"''+esc(desc)+''\",\"url\":\"''+esc(url)+''\",\"tags\":''+json.dumps(tags,ensure_ascii=False)+''}'') new_data = ''const allItems = [\n      '' + '',\n      ''.join(data) + ''\n    ];'' html = html[:si] + new_data + html[ei:] open(''index.html'',''w'',encoding=''utf-8'').write(html) print(''Written:'', len(final), ''records'', file=sys.stderr)"'
      shell: bash
    - name: Commit and push
      run: 'if ! git diff --quiet; then git config user.name "github-actions[bot]"; git config user.email "41898282+github-actions[bot]@users.noreply.github.com"; git add index.html; git commit -m "chore: sync $(date -u +%Y-%m-%dT%H:%M:%SZ)"; git push origin main; else echo "No changes"; fi'
