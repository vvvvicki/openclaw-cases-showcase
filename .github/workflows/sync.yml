name: Sync from Feishu

on: workflow_dispatch

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup SSH for git push
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H github.com >> ~/.ssh/known_hosts 2>/dev/null
        env:
          SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_KEY_PRIVATE }}

      - name: Download and run sync script
        env:
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_APP_TOKEN: RDaKbFv7EaWDnWsjU6fcocYvnNh
          FEISHU_TABLE_ID: tblygXXyTmKGUp6q
        run: |
          git remote set-url origin git@github.com:vvvvicki/openclaw-cases-showcase.git
          curl -sL "https://raw.githubusercontent.com/vvvvicki/openclaw-cases-showcase/main/sync_from_feishu.py" -o /tmp/sync_from_feishu.py
          python3 /tmp/sync_from_feishu.py

      - name: Commit and push
        run: |
          if ! git diff --quiet; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add index.html
            git commit -m "chore: sync $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push origin main
          else
            echo "No changes"
          fi
