name: Test8
on: workflow_dispatch
jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Fetch
        id: feishu
        env:
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_APP_TOKEN: RDaKbFv7EaWDnWsjU6fcocYvnNh
          FEISHU_TABLE_ID: tblygXXyTmKGUp6q
        run: |
          TOKEN_RESP=$(curl -s -X POST "https://open.feishu.cn/open-apis/auth/v3/tenant_access_token/internal" \
            -H "Content-Type: application/json" \
            -d "{\"app_id\":\"$FEISHU_APP_ID\",\"app_secret\":\"$FEISHU_APP_SECRET\"}")
          TOKEN=$(echo $TOKEN_RESP | python3 -c "import sys,json; print(json.load(sys.stdin).get('tenant_access_token',''))")
          echo "token_len=${#TOKEN}" >> $GITHUB_OUTPUT
          if [ -z "$TOKEN" ]; then echo "Failed: $TOKEN_RESP"; exit 1; fi
          ALL_RECORDS='[]'
          PAGE_TOKEN=""
          ITER=0
          while [ $ITER -lt 20 ]; do
            ITER=$((ITER+1))
            URL="https://open.feishu.cn/open-apis/bitable/v1/apps/$FEISHU_APP_TOKEN/tables/$FEISHU_TABLE_ID/records?page_size=500"
            [ -n "$PAGE_TOKEN" ] && URL="${URL}&page_token=$PAGE_TOKEN"
            RESP=$(curl -s -g "$URL" -H "Authorization: Bearer $TOKEN")
            ITEMS=$(echo $RESP | python3 -c "import sys,json; d=json.load(sys.stdin); print(json.dumps(d.get('data',{}).get('items',[])))")
            ALL_RECORDS=$(python3 -c "import json,sys; g=json.load(sys.stdin[0]); n=json.load(sys.stdin[1]); g.extend(n); print(json.dumps(g))" <(echo $ALL_RECORDS) <(echo $ITEMS))
            if echo $RESP | python3 -c "import sys,json; sys.exit(0 if json.load(sys.stdin).get('data',{}).get('has_more') else 1)"; then break; fi
            PAGE_TOKEN=$(echo $RESP | python3 -c "import sys,json; print(json.load(sys.stdin).get('data',{}).get('page_token',''))")
          done
          echo "total=$(echo $ALL_RECORDS | python3 -c 'import json,sys; print(len(json.load(sys.stdin)))')" >> $GITHUB_OUTPUT
          echo "all_records=$ALL_RECORDS" >> $GITHUB_OUTPUT
