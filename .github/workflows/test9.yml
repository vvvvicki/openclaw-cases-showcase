name: Sync from Feishu

on: workflow_dispatch

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Fetch from Feishu Bitable
        id: feishu
        env:
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_APP_TOKEN: RDaKbFv7EaWDnWsjU6fcocYvnNh
          FEISHU_TABLE_ID: tblygXXyTmKGUp6q
        run: |
          TOKEN_RESP=$(curl -s -X POST "https://open.feishu.cn/open-apis/auth/v3/tenant_access_token/internal" \
            -H "Content-Type: application/json" \
            -d "{\"app_id\":\"$FEISHU_APP_ID\",\"app_secret\":\"$FEISHU_APP_SECRET\"}")
          TOKEN=$(echo $TOKEN_RESP | python3 -c "import sys,json; print(json.load(sys.stdin).get('tenant_access_token',''))")
          echo "token_len=${#TOKEN}" >> $GITHUB_OUTPUT
          if [ -z "$TOKEN" ]; then echo "Failed: $TOKEN_RESP"; exit 1; fi

          ALL_RECORDS='[]'
          PAGE_TOKEN=""
          ITER=0
          while [ $ITER -lt 20 ]; do
            ITER=$((ITER+1))
            URL="https://open.feishu.cn/open-apis/bitable/v1/apps/$FEISHU_APP_TOKEN/tables/$FEISHU_TABLE_ID/records?page_size=500"
            [ -n "$PAGE_TOKEN" ] && URL="${URL}&page_token=$PAGE_TOKEN"
            RESP=$(curl -s -g "$URL" -H "Authorization: Bearer $TOKEN")
            ITEMS=$(echo $RESP | python3 -c "import sys,json; d=json.load(sys.stdin); print(json.dumps(d.get('data',{}).get('items',[])))")
            ALL_RECORDS=$(python3 -c "import json,sys; g=json.load(sys.stdin[0]); n=json.load(sys.stdin[1]); g.extend(n); print(json.dumps(g))" <(echo $ALL_RECORDS) <(echo $ITEMS))
            if echo $RESP | python3 -c "import sys,json; sys.exit(0 if json.load(sys.stdin).get('data',{}).get('has_more') else 1)"; then break; fi
            PAGE_TOKEN=$(echo $RESP | python3 -c "import sys,json; print(json.load(sys.stdin).get('data',{}).get('page_token',''))")
          done
          echo "total=$(echo $ALL_RECORDS | python3 -c 'import json,sys; print(len(json.load(sys.stdin)))')" >> $GITHUB_OUTPUT
          echo "all_records=$ALL_RECORDS" >> $GITHUB_OUTPUT

      - name: Generate index.html
        env:
          ALL_RECORDS: ${{ fromJson(steps.feishu.outputs.all_records) }}
        run: |
          python3 << 'PYEOF'
import json, sys, os

records = json.loads(os.environ.get('ALL_RECORDS', '[]'))

def score(r):
    f = r.get('fields', {})
    s = f.get('评估分')
    if s is None: return 0
    try: return float(s)
    except: return 0

filtered = [r for r in records if score(r) >= 7]
print(f"Filtered: {len(records)} -> {len(filtered)}", file=sys.stderr)

def sort_key(r):
    f = r.get('fields', {})
    return (-score(r), -float(f.get('热度信号') or 0))

filtered.sort(key=sort_key)
seen = {}
for r in filtered:
    link = r.get('fields', {}).get('案例链接', {}) or {}
    url = (link.get('link','') if isinstance(link,dict) else '') or ''
    if url and (url not in seen or score(r) > score(seen[url])):
        seen[url] = r
final = list(seen.values())[:50]
final.sort(key=sort_key)
print(f"Deduped: {len(filtered)} -> {len(final)}", file=sys.stderr)

def gen_tags(r):
    f = r.get('fields', {})
    t = []
    for k in ['迁移难度','来源平台']:
        v = f.get(k)
        if v: t.append(v)
    h = f.get('启发价值') or ''
    for kw in ['多Agent','变现','Telegram','自动化','本地部署','入门']:
        if kw in h: t.append(kw)
    return t[:3]

def esc(v):
    return (str(v) or '').replace('\\','\\\\').replace('"','\\"').replace('\n',' ').replace('\r','')

with open('index.html','r',encoding='utf-8') as f:
    html = f.read()
si = html.find('const allItems = [')
ei = html.find('];\nfunction diffClass')
if si==-1 or ei==-1:
    print("ERROR: markers not found", file=sys.stderr)
    sys.exit(1)

data = []
for r in final:
    f = r.get('fields', {})
    link = f.get('案例链接', {}) or {}
    url = (link.get('link','') if isinstance(link,dict) else '') or ''
    title = f.get('案例名称') or f.get('OpenClaw玩法猎手-候选池') or '无标题'
    plat = f.get('来源平台') or '其他'
    s = score(r)
    diff = f.get('迁移难度') or '中等'
    desc = f.get('核心玩法描述') or ''
    tags = gen_tags(r)
    data.append(f'{{"id":"{esc(r["id"])}","title":"{esc(title)}","platform":"{esc(plat)}","score":{s},"difficulty":"{esc(diff)}","description":"{esc(desc)}","url":"{esc(url)}","tags":{json.dumps(tags,ensure_ascii=False)}}}')

new_data = 'const allItems = [\n      ' + ',\n      '.join(data) + '\n    ];'
new_html = html[:si] + new_data + html[ei:]
with open('index.html','w',encoding='utf-8') as f:
    f.write(new_html)
print(f"Written: {len(final)} records", file=sys.stderr)
PYEOF

      - name: Commit and push
        run: |
          if ! git diff --quiet; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add index.html
            git commit -m "chore: sync from Feishu Bitable $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push origin main
          else
            echo "No changes"
          fi
